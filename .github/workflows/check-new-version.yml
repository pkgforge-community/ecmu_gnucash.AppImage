name: Check GnuCash New Version

on:
  schedule:
    - cron: '0 6 * * 1'  # Tous les lundis à 6h00 UTC
  workflow_dispatch:       # Lancement manuel possible

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Pour créer un tag et une release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour accéder aux tags locaux

      - name: Get latest GnuCash upstream tag
        id: upstream
        run: |
          # Récupère le dernier tag de GnuCash (format: 5.14, 5.15, ...)
          LATEST=$(curl -s https://api.github.com/repos/Gnucash/gnucash/tags \
            | jq -r '[.[].name | select(test("^[0-9]+\\.[0-9]+(\\.[0-9]+)?$"))] | first')
          
          echo "Dernier tag upstream: $LATEST"
          echo "version=${LATEST}" >> $GITHUB_OUTPUT

      - name: Check if release already exists in this repo
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          TAG="v${VERSION}"
          
          # Vérifie si une release avec ce tag existe déjà
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG})
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ La release $TAG existe déjà, rien à faire."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "🆕 Nouvelle version détectée: $TAG — build nécessaire."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      #- name: Update .env with new version
      #  if: steps.check.outputs.should_build == 'true'
      #  run: |
      #    VERSION="${{ steps.upstream.outputs.version }}"
      #    echo "GNUCASH_VERSION=${VERSION}" > .env
      #    echo "Fichier .env mis à jour: GNUCASH_VERSION=${VERSION}"

      #- name: Commit and push updated .env
      #  if: steps.check.outputs.should_build == 'true'
      #  run: |
      #    git config user.name  "github-actions[bot]"
      #    git config user.email "github-actions[bot]@users.noreply.github.com"
      #    
      #    git add .env
      #    git diff --staged --quiet || git commit -m "chore: bump GnuCash version to ${{ steps.upstream.outputs.version }}"
      #    git push origin main

      - name: Create and push version tag
        if: steps.check.outputs.should_build == 'true'
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          VERSION="${{ steps.upstream.outputs.version }}"
          
          git tag -a "$TAG" -m "GnuCash AppImage $VERSION"
          git push origin "$TAG"
          
          echo "✅ Tag $TAG créé et poussé — build-release.yml va se déclencher automatiquement."
