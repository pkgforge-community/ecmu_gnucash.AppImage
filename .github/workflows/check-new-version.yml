name: Check GnuCash New Version

on:
  schedule:
    - cron: '0 2 * * 1'  # Tous les lundis à 2h00 UTC (= 3h CET / 4h CEST)
  workflow_dispatch:       # Lancement manuel possible

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Pour créer un tag et une release
    outputs: #Variables exposées pour le job suivant
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.upstream.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour accéder aux tags locaux

      - name: Get latest GnuCash upstream tag
        id: upstream
        run: |
          # Récupère le dernier tag de GnuCash (format: 5.14, 5.15, ...)
          LATEST=$(curl -s https://api.github.com/repos/Gnucash/gnucash/tags \
            | jq -r '[.[].name | select(test("^[0-9]+\\.[0-9]+(\\.[0-9]+)?$"))] | first')
          
          echo "Dernier tag upstream: $LATEST"
          echo "version=${LATEST}" >> $GITHUB_OUTPUT

      - name: Check if release already exists in this repo
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          TAG="${VERSION}"
          
          # Vérifie si une release avec ce tag existe déjà
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG})
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ La release $TAG existe déjà, rien à faire."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "🆕 Nouvelle version détectée: $TAG — build nécessaire."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  trigger-build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    uses: ./.github/workflows/build-release.yml
    with:
      version: ${{ needs.check-version.outputs.version }}
      debug: false
    permissions:
      contents: write

