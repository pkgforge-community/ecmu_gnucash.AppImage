name: Nightly Build

on:
  schedule:
    # Tous les jours à 2h00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load version from .env
        run: |
          source .env
          echo "GNUCASH_VERSION=${GNUCASH_VERSION}" >> $GITHUB_ENV

      - name: Display version
        run: echo "Building GnuCash ${{ env.GNUCASH_VERSION }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/gnucash-*.tar.bz2
            build/linuxdeploy-x86_64.AppImage
            build/appimagetool-x86_64.AppImage
          key: gnucash-nightly-${{ env.GNUCASH_VERSION }}-${{ github.run_number }}
          restore-keys: |
            gnucash-nightly-${{ env.GNUCASH_VERSION }}-
            gnucash-tools-${{ env.GNUCASH_VERSION }}-

      - name: Build AppImage
        run: |
          mkdir -p output
          chmod +x build.sh
          ./build.sh build

      - name: Get build date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Upload nightly build
        uses: actions/upload-artifact@v4
        with:
          name: GnuCash-Nightly-${{ steps.date.outputs.date }}
          path: output/*.AppImage
          retention-days: 14  # Conserver 2 semaines de nightly builds
